<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitoring Jemuran Otomatis</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card h3{
    margin-bottom:10px;
}

.value{
    font-size:28px;
    font-weight:bold;
}

/* Status Hujan */
.hujan{
    background:#ffdddd;
    border-left:8px solid #ff4444;
}

.tidak-hujan{
    background:#ddffdd;
    border-left:8px solid #00aa00;
}

/* Status Cahaya */
.terang{
    background:#fff7cc;
    border-left:8px solid #ffcc00;
}

.gelap{
    background:#dddddd;
    border-left:8px solid #666666;
}

/* Status Jemuran */
.keluar{
    background:#d9ffd9;
    border-left:8px solid #00c853;
}

.masuk{
    background:#dde8ff;
    border-left:8px solid #2962ff;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:gray;
}

</style>
</head>
<body>

<div class="container">

<h1>🌤️ Monitoring Jemuran Otomatis</h1>

<div class="card" id="cardHujan">
    <h3>☔ Status Hujan</h3>
    <div class="value" id="status_hujan">Loading...</div>
</div>

<div class="card" id="cardCahaya">
    <h3>☀️ Status Cahaya</h3>
    <div class="value" id="status_cahaya">Loading...</div>
</div>

<div class="card">
    <h3>📈 Nilai LDR</h3>
    <div class="value" id="nilai_ldr">Loading...</div>
</div>

<div class="card" id="cardJemuran">
    <h3>👕 Status Jemuran</h3>
    <div class="value" id="status_jemuran">Loading...</div>
</div>

<div class="footer">
    Update otomatis setiap 2 detik
</div>

</div>

<script>

const firebaseURL =
"https://gyzzafaril1-52617-default-rtdb.firebaseio.com/jemuran.json";

async function updateData(){

    try{

        const response = await fetch(firebaseURL);
        const data = await response.json();

        // Isi data
        document.getElementById("status_hujan").innerText =
        data.status_hujan;

        document.getElementById("status_cahaya").innerText =
        data.status_cahaya;

        document.getElementById("nilai_ldr").innerText =
        data.nilai_ldr;

        document.getElementById("status_jemuran").innerText =
        data.status_jemuran;

        // Card Hujan
        const cardHujan =
        document.getElementById("cardHujan");

        cardHujan.className = "card";

        if(data.status_hujan === "HUJAN"){
            cardHujan.classList.add("hujan");
        }else{
            cardHujan.classList.add("tidak-hujan");
        }

        // Card Cahaya
        const cardCahaya =
        document.getElementById("cardCahaya");

        cardCahaya.className = "card";

        if(data.status_cahaya === "TERANG"){
            cardCahaya.classList.add("terang");
        }else{
            cardCahaya.classList.add("gelap");
        }

        // Card Jemuran
        const cardJemuran =
        document.getElementById("cardJemuran");

        cardJemuran.className = "card";

        if(data.status_jemuran === "KELUAR"){
            cardJemuran.classList.add("keluar");
        }else{
            cardJemuran.classList.add("masuk");
        }

    }
    catch(error){

        console.error(error);

    }
}

updateData();
setInterval(updateData, 2000);

</script>

</body>
</html>
